<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        .emoji {
            border: none;
            background-color: transparent;
            font-size: 50px;
            cursor: pointer;
        }

        #resetBtn {
            background-color: white;
            padding: 5px;
            font-size: 20px;
            border-radius: 6px;
        }

        h4 {
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>

    <button class="emoji" onclick="
        const randomNumber = Math.random();
        let computerMove = '';
        let result = '';

        if (randomNumber >= 0 && randomNumber < 1/3) {
            computerMove = 'rock';
            document.getElementById('visual').innerText = `You ✊ - Computer ✊`;
        } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
            computerMove = 'paper';
            document.getElementById('visual').innerText = `You ✊ - Computer ✋`;
        } else {
            computerMove = 'scissors';
            document.getElementById('visual').innerText = `You ✊ - Computer ✌️`;
        }

        if (computerMove === 'rock') {
            result = 'Tie';
            document.getElementById('result').innerText = result;
            ties++;
            document.getElementById('stat').innerText = `Wins: ${wins}, Losses: ${losses}, Ties: ${ties}`;
        } else if (computerMove === 'paper') {
            result = 'You Lose';
            document.getElementById('result').innerText = result;
            losses++;
            document.getElementById('stat').innerText = `Wins: ${wins}, Losses: ${losses}, Ties: ${ties}`;
        } else if (computerMove === 'scissors') {
            result = 'You Win';
            document.getElementById('result').innerText = result;
            wins++;
            document.getElementById('stat').innerText = `Wins: ${wins}, Losses: ${losses}, Ties: ${ties}`;
        }
    ">✊</button>

    <h3 id="result"></h3>
    <h3 id="visual"></h3>
    <h4 id="stat">Wins: 0, Losses: 0, Ties: 0</h4>
    <button id="resetBtn" onclick="
        wins = 0;
        losses = 0;
        ties = 0;
        document.getElementById('stat').innerText = `Wins: ${wins}, Losses: ${losses}, Ties: ${ties}`;
