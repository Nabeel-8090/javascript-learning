<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <script>
        function greet(name) {
            if(!name) {
                console.log(`Hi there! instead`);
            } else {
                console.log(`Hello ${name}`);
            }
        }
        greet('Nabeel');

        function convertToFahrenheit(celsius) {
            return (celsius * 9 / 5) + 32;
        }
        console.log(convertToFahrenheit(25));

        function convertToCelsius(fahrenheit) {
            return (fahrenheit - 32) * 5 / 9;
        }
        console.log(convertToCelsius(77));

        function convertTemperature(degrees, unit) {
            if(unit === 'C') {
                return `${(degrees * 9 / 5) + 32}F`;
            } else if (unit === 'F') {
                return `${(degrees - 32) * 5 / 9}C`;
            }
            return 'Unit can be C or F only';
        }
        console.log(convertTemperature(25, 'C'));
        console.log(convertTemperature(86, 'F'));
        console.log(convertTemperature(68, 'I'));

        function convertLength(length, from, to) {
            if (from === 'miles') {
                if(to === 'miles') {
                    return `${length} miles`;
                } else if (to === 'km') {
                    return `${length*1.6} km`;
                } else if (to === 'ft') {
                    return `${length*5280} ft`;
                }
            } else if (from === 'km') {
                if(to === 'miles') {
                    return `${length/1.6} miles`;
                } else if (to === 'km') {
                    return `${length} km`;
                } else if (to === 'ft') {
                    return `${length*3281} ft`;
                }
            } else if (from === 'ft') {
                if(to === 'miles') {
                    return `${length/5280} miles`;
                } else if (to === 'km') {
                    return `${length/3281} km`;
                } else if (to === 'ft') {
                    return `${length} ft`;
                }
            } else {
                return `Invalid unit`;
            }
        }
        console.log(convertLength(50, 'miles', 'km'));
        console.log(convertLength(32, 'km', 'miles'));
        console.log(convertLength(50, 'miles', 'miles'));
        console.log(convertLength(5, 'miles', 'km'));
        console.log(convertLength(5, 'miles', 'ft'));
        console.log(convertLength(16405, 'ft', 'km'));
        console.log(convertLength(16405, 'ft', 'ft'));
        console.log(convertLength(36, 'ft', 'miles'));
        console.log(convertLength(5, 'lbs', 'lbs'));
    </script>
</body>
</html>
