<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        .emoji {
            border: none;
            background-color: transparent;
            font-size: 50px;
            cursor: pointer;
        }

        #resetBtn {
            background-color: white;
            padding: 5px;
            font-size: 20px;
            border-radius: 6px;
        }

        h4 {
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>

    <button class="emoji" onclick="
        playGame('rock');
    ">✊</button>
    
    <button class="emoji" onclick="
        playGame('paper');
    ">✋</button>

    <button class="emoji" onclick="
        playGame('scissors');
    ">✌️</button>

    <h3 id="result"></h3>
    <h3 id="visual"></h3>
    <h4 id="stat">Wins: 0, Losses: 0, Ties: 0</h4>

    <button id="resetBtn" onclick="
        wins = 0; losses = 0; ties = 0;
        document.getElementById('result').innerText = '';
        document.getElementById('visual').innerText = '';
        document.getElementById('stat').innerText = `Wins: 0, Losses: 0, Ties: 0`;
    ">Reset Score</button>

    <script>
        let wins = 0; let losses = 0; let ties = 0;

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove = 'rock';
            } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'paper';
            } else {
                computerMove = 'scissors';
            }

            return computerMove;
        }

        function displayResult(result, myMove, computerMove) {
            document.getElementById('result').innerText = result;
            document.getElementById('stat').innerText = `Wins: ${wins}, Losses: ${losses}, Ties: ${ties}`;
            document.getElementById('visual').innerText = `You ${myMove} - Computer ${computerMove}`;
        }

        function playGame(myMove) {

            const computerMove = pickComputerMove();

            if (myMove === 'rock' && computerMove === 'rock') {
                ties++;
                displayResult('Tie', '✊', '✊');
                
            } else if (myMove === 'rock' && computerMove === 'paper') {
                losses++;
                displayResult('You Lose', '✊', '✋');
                
            } else if (myMove === 'rock' && computerMove === 'scissors') {
                wins++;
                displayResult('You Win', '✊', '✌️');
                
            } else if (myMove === 'paper' && computerMove === 'rock') {
                wins++;
                displayResult('You Win', '✋', '✊');
                
            } else if (myMove === 'paper' && computerMove === 'paper') {
                ties++;
                displayResult('Tie', '✋', '✋');
                
            } else if (myMove === 'paper' && computerMove === 'scissors') {
                losses++;
                displayResult('You Lose', '✋', '✌️');
                
            } else if (myMove === 'scissors' && computerMove === 'rock') {
                losses++;
                displayResult('You Lose', '✌️', '✊');
                
            } else if (myMove === 'scissors' && computerMove === 'paper') {
                wins++;
                displayResult('You Win', '✌️', '✋');
                
            } else if (myMove === 'scissors' && computerMove === 'scissors') {
                ties++;
                displayResult('Tie', '✌️', '✌️');
                
            }
        }
    </script>
</body>
</html>
