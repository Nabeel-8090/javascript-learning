<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Game</title>

    <style>
        button {
            background-color: grey;
            font-size: 30px;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #80808096;
        }
    </style>
</head>
<body>

    <button onclick="playGame('heads')">Heads</button>
    <button onclick="playGame('tails')">Tails</button>

    <h2 id="result"></h2>
    <p id="computer-guess"></p>
    <p id="stats">Wins: 0, Losses: 0</p>

    <script>

        const score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0
        };

        document.getElementById("stats").innerText = `Wins: ${score.wins}, Losses: ${score.losses}`;

        function playGame(guess) {
            const randomNo = Math.random();

            const computerGuess = randomNo < 0.5 ? 'heads' : 'tails';

            if (guess === computerGuess) {
                score.wins++;
                displayResult('You Win', computerGuess);
            } else {
                score.losses++;
                displayResult('You Lose', computerGuess);
            }

            document.getElementById("stats").innerText = `Wins: ${score.wins}, Losses: ${score.losses}`;
            localStorage.setItem('score', JSON.stringify(score));
        }

        function displayResult(result, computerGuess) {
            document.getElementById("result").innerText = result;

            if (computerGuess === 'heads') {
                document.getElementById("computer-guess").innerText = 'Computer Guess: Heads';
            } else {
                document.getElementById("computer-guess").innerText = 'Computer Guess: Tails';
            }
        }

    </script>

</body>
</html>
