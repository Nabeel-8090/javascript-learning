        // 8d
        function comparePrice(product1, product2) {
            if(product1.price <= product2.price) {
                return product1;
            } else if (product1.price > product2.price) {
                return product2;
            }
        }
        const lessExpensiveProduct = comparePrice({name: 'socks', price: 799}, {name: 'football', price: 699});
        console.log(lessExpensiveProduct);

        // 8e
        function isSameProduct(product1, product2) {
            if(product1.name === product2.name && product1.price === product2.price) {
                return true;
            }
            return false;
        }
        const isSameProductExist = isSameProduct({name: 'socks', price: 799}, {name: 'socks', price: 799});
